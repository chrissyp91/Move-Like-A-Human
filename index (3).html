<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Move Like A Human</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1018;color:#fff;font-family:'Courier New',monospace;min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px;}
.logo .m{color:#c0392b;font-size:18px;font-weight:900;letter-spacing:4px;}
.logo .r{color:#fff;font-size:18px;font-weight:900;letter-spacing:4px;}
button{cursor:pointer;font-family:'Courier New',monospace;}
.bp{background:#c0392b;border:none;color:#fff;padding:11px 22px;border-radius:8px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.bb{background:transparent;border:none;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:0;}
.bg{background:transparent;border:1px solid #1e2030;color:#fff;padding:7px 14px;border-radius:6px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
input,textarea{background:rgba(255,255,255,0.05);border:1px solid #2a2a3a;border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;font-family:'Courier New',monospace;outline:none;width:100%;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3);}
label{font-size:10px;color:#fff;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:8px;}
.sc{display:none;} .sc.on{display:block;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.card{background:rgba(255,255,255,0.03);border:1px solid #1e2030;border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;}
.tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid #1e2030;padding-bottom:12px;flex-wrap:wrap;}
.tab{background:transparent;border:1px solid #1e2030;color:#fff;border-radius:6px;padding:7px 16px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;}
.cw{height:260px;margin-bottom:20px;position:relative;}
.si{background:rgba(255,255,255,0.03);border:1px solid #1e2030;border-radius:8px;padding:12px 16px;display:flex;gap:12px;margin-bottom:6px;}
.sb{width:3px;min-height:36px;background:#c0392b;border-radius:2px;flex-shrink:0;margin-top:2px;}
.cr{background:rgba(255,255,255,0.03);border:1px solid #1e2030;border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cr:hover{border-color:#c0392b;background:rgba(192,57,43,0.06);}
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.nd{height:200px;display:flex;align-items:center;justify-content:center;color:#fff;opacity:0.3;font-size:13px;}
.rr{margin-bottom:20px;display:none;align-items:center;gap:10px;flex-wrap:wrap;}
h1{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px;}
</style>
</head>
<body>

<div id="s-list" class="sc on">
  <div class="wrap">
    <div class="hr">
      <div class="logo"><span class="m">MOVE </span><span class="r">LIKE A HUMAN</span></div>
      <button class="bp" onclick="goAdd()">+ Add Client</button>
    </div>
    <h1>Client Dashboard</h1>
    <div style="font-size:11px;color:#fff;opacity:0.7;margin-bottom:24px" id="cnt"></div>
    <div id="clist"></div>
  </div>
</div>

<div id="s-addclient" class="sc">
  <div class="wrap" style="max-width:420px">
    <div class="logo" style="margin-bottom:32px"><span class="m">MOVE </span><span class="r">LIKE A HUMAN</span></div>
    <button class="bb" onclick="goList()">← Back</button>
    <h1 style="margin-top:20px">New Client</h1>
    <p style="color:#fff;opacity:0.7;font-size:12px;margin:6px 0 24px">Enter their name to get started.</p>
    <label>Client Name</label>
    <input id="nc" placeholder="e.g. Matt.A" onkeydown="if(event.key==='Enter')saveClient()" style="margin-bottom:16px"/>
    <button class="bp" onclick="saveClient()">Add Client</button>
  </div>
</div>

<div id="s-addsession" class="sc">
  <div class="wrap" style="max-width:440px">
    <div class="logo" style="margin-bottom:32px"><span class="m">MOVE </span><span class="r">LIKE A HUMAN</span></div>
    <button class="bb" onclick="goDetail()">← Back</button>
    <h1 style="margin-top:20px">Log Session</h1>
    <p id="scn" style="color:#fff;opacity:0.7;font-size:12px;margin:6px 0 24px"></p>
    <div style="margin-bottom:18px">
      <label>Date</label>
      <input type="date" id="sd"/>
    </div>
    <div style="margin-bottom:18px">
      <label>Top Weight Per Lift (kg) — leave blank if not done</label>
      <div class="g3" style="margin-top:10px">
        <div><div style="font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;color:#e05555">Squat</div><input type="number" id="ss" placeholder="—" style="text-align:center;padding:14px 6px;font-size:18px;font-weight:900"/></div>
        <div><div style="font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;color:#4a9eff">Bench</div><input type="number" id="sb2" placeholder="—" style="text-align:center;padding:14px 6px;font-size:18px;font-weight:900"/></div>
        <div><div style="font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;color:#b06aff">Deadlift</div><input type="number" id="sdl" placeholder="—" style="text-align:center;padding:14px 6px;font-size:18px;font-weight:900"/></div>
      </div>
    </div>
    <div style="margin-bottom:28px">
      <label>Notes (optional)</label>
      <textarea id="sn" placeholder="e.g. Holiday, sick, PB, missed reps..." rows="3" style="resize:vertical;min-height:80px"></textarea>
    </div>
    <button class="bp" onclick="saveSession()">Save Session</button>
  </div>
</div>

<div id="s-detail" class="sc">
  <div class="wrap">
    <div class="hr">
      <div class="logo"><span class="m">MOVE </span><span class="r">LIKE A HUMAN</span></div>
      <button class="bb" onclick="goList()">← All Clients</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
          <h1 id="dn"></h1>
          <button style="background:transparent;border:none;color:#fff;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:0.4;cursor:pointer;font-family:'Courier New',monospace" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4" onclick="startRename()">rename</button>
        </div>
        <div style="font-size:11px;color:#fff;opacity:0.7;margin-bottom:24px" id="dm"></div>
      </div>
      <button class="bp" onclick="goSession()">+ Log Session</button>
    </div>
    <div class="rr" id="rr">
      <input id="ri" style="max-width:280px" onkeydown="if(event.key==='Enter')saveRename()"/>
      <button class="bp" style="padding:8px 14px;font-size:10px" onclick="saveRename()">Save</button>
      <button class="bg" onclick="cancelRename()">Cancel</button>
    </div>
    <div class="g3" style="margin-bottom:28px" id="sc2"></div>
    <div class="tabs">
      <button class="tab" id="t-squat"     onclick="setC('squat')">Squat</button>
      <button class="tab" id="t-bench"     onclick="setC('bench')">Bench</button>
      <button class="tab" id="t-deadlift"  onclick="setC('deadlift')">Deadlift</button>
      <button class="tab" id="t-frequency" onclick="setC('frequency')">Frequency</button>
    </div>
    <div class="cw">
      <canvas id="mc"></canvas>
      <div class="nd" id="nd" style="display:none">No data recorded yet</div>
    </div>
    <div style="margin-top:32px">
      <button style="background:transparent;border:none;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Courier New',monospace;display:flex;align-items:center;gap:6px;margin-bottom:12px" onclick="toggleLog()">
        <span id="la">▸</span><span id="ll">Session Log</span>
      </button>
      <div id="log" style="display:none"></div>
    </div>
    <div style="margin-top:36px;padding-top:16px;border-top:1px solid #1e2030;display:flex;justify-content:space-between;align-items:center">
      <div class="logo"><span class="m">MOVE </span><span class="r">LIKE A HUMAN</span></div>
      <div style="font-size:9px;color:#fff;opacity:0.3;letter-spacing:2px" id="fc"></div>
    </div>
  </div>
</div>

<script>
const PRE=[
  {id:"p1", date:"2024-12-27",squat:30, bench:40, deadlift:25,  notes:"First session"},
  {id:"p2", date:"2024-12-30",squat:65, bench:60, deadlift:40,  notes:""},
  {id:"p3", date:"2025-01-06",squat:75, bench:75, deadlift:50,  notes:""},
  {id:"p4", date:"2025-01-13",squat:75, bench:75, deadlift:50,  notes:""},
  {id:"p5", date:"2025-01-20",squat:75, bench:80, deadlift:60,  notes:"Rack pull Level 6 60kg"},
  {id:"p6", date:"2025-08-04",squat:95, bench:100,deadlift:60,  notes:"Back to training"},
  {id:"p7", date:"2025-08-11",squat:90, bench:90, deadlift:65,  notes:"Left side issue at 90kg squat"},
  {id:"p8", date:"2025-08-18",squat:100,bench:95, deadlift:null,notes:"1RM Test Squat 100kg Bench 95kg"},
  {id:"p9", date:"2025-08-25",squat:95, bench:90, deadlift:70,  notes:""},
  {id:"p10",date:"2025-09-17",squat:85, bench:90, deadlift:70,  notes:"95kg squat failed"},
  {id:"p11",date:"2025-09-22",squat:85, bench:85, deadlift:75,  notes:"Deadlift peak 75kg"},
  {id:"p12",date:"2025-09-29",squat:85, bench:90, deadlift:60,  notes:"Deadlift struggled"},
  {id:"p13",date:"2025-10-06",squat:90, bench:90, deadlift:75,  notes:""},
  {id:"p14",date:"2025-10-20",squat:75, bench:90, deadlift:70,  notes:"Tough session"},
  {id:"p15",date:"2025-10-27",squat:75, bench:90, deadlift:70,  notes:""},
  {id:"p16",date:"2025-11-03",squat:80, bench:90, deadlift:70,  notes:""},
  {id:"p17",date:"2025-12-01",squat:70, bench:80, deadlift:40,  notes:"Possible deload"},
  {id:"p18",date:"2025-12-08",squat:75, bench:80, deadlift:40,  notes:""},
  {id:"p19",date:"2025-12-15",squat:75, bench:80, deadlift:40,  notes:""},
  {id:"p20",date:"2026-01-14",squat:75, bench:80, deadlift:40,  notes:"Back from break"},
  {id:"p21",date:"2026-01-21",squat:80, bench:90, deadlift:45,  notes:"80kg squat x3 good progress"},
  {id:"p22",date:"2026-01-28",squat:80, bench:90, deadlift:45,  notes:""},
  {id:"p23",date:"2026-02-09",squat:85, bench:90, deadlift:50,  notes:"85kg squat x3"},
  {id:"p24",date:"2026-03-16",squat:85, bench:80, deadlift:60,  notes:"Back from time off"},
  {id:"p25",date:"2026-03-23",squat:90, bench:80, deadlift:60,  notes:"90kg squat x3"},
  {id:"p26",date:"2026-03-30",squat:90, bench:90, deadlift:60,  notes:""},
  {id:"p27",date:"2026-04-06",squat:95, bench:90, deadlift:60,  notes:"95kg squat x2 great session"},
  {id:"p28",date:"2026-04-13",squat:95, bench:90, deadlift:60,  notes:"95kg squat x4 bench 90kg x3"},
  {id:"p29",date:"2026-04-20",squat:95, bench:90, deadlift:60,  notes:"Bench 90kg x3"},
];

function def(){return [{id:"c1",name:"Matt.A",sessions:[...PRE]}];}
function load(){try{const s=localStorage.getItem("mlah_v5");return s?JSON.parse(s):def();}catch{return def();}}
function sv(){localStorage.setItem("mlah_v5",JSON.stringify(C));}

let C=load(),cid=null,ct="squat",CI=null,lo=false;
const gid=()=>Math.random().toString(36).substr(2,9);
const fmt=d=>new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtS=d=>new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"});
const lat=(s,k)=>{const x=[...s].filter(v=>v[k]!=null).sort((a,b)=>new Date(b.date)-new Date(a.date));return x.length?x[0][k]:null;};
const bst=(s,k)=>{const v=s.filter(x=>x[k]!=null).map(x=>x[k]);return v.length?Math.max(...v):null;};
const fst=(s,k)=>{const x=[...s].filter(v=>v[k]!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));return x.length?x[0][k]:null;};
const ld=s=>s.length?[...s].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date:null;

function show(id){document.querySelectorAll(".sc").forEach(s=>s.classList.remove("on"));document.getElementById(id).classList.add("on");}
function goList(){renderList();show("s-list");}
function goAdd(){document.getElementById("nc").value="";show("s-addclient");}
function goDetail(){renderDetail();show("s-detail");}
function goSession(){
  document.getElementById("sd").value=new Date().toISOString().split("T")[0];
  ["ss","sb2","sdl"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("sn").value="";
  const c=C.find(x=>x.id===cid);
  document.getElementById("scn").textContent=c?c.name:"";
  show("s-addsession");
}

function renderList(){
  document.getElementById("cnt").textContent=`${C.length} client${C.length!==1?"s":""} · data saved automatically`;
  document.getElementById("clist").innerHTML=C.map(cl=>{
    const sq=lat(cl.sessions,"squat"),bn=lat(cl.sessions,"bench"),dl=lat(cl.sessions,"deadlift"),ldt=ld(cl.sessions);
    const lifts=[sq!=null?`<span style="color:#e05555;font-weight:700;font-size:12px">Squat ${sq}kg</span>`:"",bn!=null?`<span style="color:#4a9eff;font-weight:700;font-size:12px">Bench ${bn}kg</span>`:"",dl!=null?`<span style="color:#b06aff;font-weight:700;font-size:12px">Deadlift ${dl}kg</span>`:""].filter(Boolean).join("");
    return `<div class="cr" onclick="open2('${cl.id}')"><div><div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:4px">${cl.name}</div><div style="font-size:11px;color:#fff;opacity:0.7">${cl.sessions.length} sessions${ldt?` · Last ${fmt(ldt)}`:""}</div><div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">${lifts||'<span style="color:#fff;opacity:0.4;font-size:12px">No sessions yet</span>'}</div></div><div style="color:#c0392b;font-size:20px;font-weight:900">→</div></div>`;
  }).join("");
}

function open2(id){cid=id;ct="squat";lo=false;renderDetail();show("s-detail");}

function saveClient(){
  const name=document.getElementById("nc").value.trim();if(!name)return;
  const cl={id:gid(),name,sessions:[]};C.push(cl);sv();cid=cl.id;renderDetail();show("s-detail");
}

function saveSession(){
  const date=document.getElementById("sd").value;if(!date)return;
  const s={id:gid(),date,squat:document.getElementById("ss").value?parseFloat(document.getElementById("ss").value):null,bench:document.getElementById("sb2").value?parseFloat(document.getElementById("sb2").value):null,deadlift:document.getElementById("sdl").value?parseFloat(document.getElementById("sdl").value):null,notes:document.getElementById("sn").value.trim()};
  const cl=C.find(x=>x.id===cid);if(cl){cl.sessions.push(s);sv();}goDetail();
}

function renderDetail(){
  const cl=C.find(x=>x.id===cid);if(!cl)return;
  document.getElementById("dn").textContent=cl.name;
  const ldt=ld(cl.sessions);
  document.getElementById("dm").textContent=`${cl.sessions.length} sessions recorded${ldt?" · Last session "+fmt(ldt):""}`;
  document.getElementById("fc").textContent=`${cl.sessions.length} SESSIONS TRACKED`;
  renderCards(cl);renderChart(cl);renderLog(cl);updateTabs();
}

function renderCards(cl){
  const lifts=[{key:"squat",label:"Squat",color:"#e05555"},{key:"bench",label:"Bench",color:"#4a9eff"},{key:"deadlift",label:"Deadlift",color:"#b06aff"}];
  document.getElementById("sc2").innerHTML=lifts.map(l=>{
    const cur=lat(cl.sessions,l.key),b=bst(cl.sessions,l.key),st=fst(cl.sessions,l.key),gain=cur!=null&&st!=null?cur-st:null,pct=cur&&b?(cur/b*100).toFixed(0):0,active=ct===l.key;
    return `<div class="card" style="border-color:${active?l.color:"#1e2030"};background:${active?"#232635":"rgba(255,255,255,0.03)"}" onclick="setC('${l.key}')">
      <div style="font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;color:${l.color}">${l.label}</div>
      ${cur!=null?`<div style="font-size:30px;font-weight:900;color:#fff;line-height:1">${cur}<span style="font-size:14px;font-weight:400;margin-left:4px">kg</span></div><div style="font-size:12px;color:#fff;margin-top:6px">Best: <strong>${b}kg</strong></div><div style="font-size:12px;color:#fff;margin-top:6px">Started: <strong>${st}kg</strong></div>${gain!=null?`<div style="font-size:12px;color:#e05555;margin-top:4px;font-weight:700">+${gain}kg gained</div>`:""}<div style="margin-top:10px;height:3px;background:#1a1a2a;border-radius:3px"><div style="height:100%;width:${pct}%;background:${l.color};border-radius:3px"></div></div>`:`<div style="font-size:13px;color:#fff;opacity:0.4;margin-top:8px">No data yet</div>`}
    </div>`;
  }).join("");
}

function setC(t){ct=t;const cl=C.find(x=>x.id===cid);renderCards(cl);renderChart(cl);updateTabs();}

function updateTabs(){
  const cols={squat:"#e05555",bench:"#4a9eff",deadlift:"#b06aff",frequency:"#c0392b"};
  ["squat","bench","deadlift","frequency"].forEach(k=>{const t=document.getElementById("t-"+k);if(k===ct){t.style.background=cols[k];t.style.color="#fff";t.style.borderColor="transparent";}else{t.style.background="transparent";t.style.color="#fff";t.style.borderColor="#1e2030";}});
}

function renderChart(cl){
  const canvas=document.getElementById("mc"),noData=document.getElementById("nd");
  if(CI){CI.destroy();CI=null;}
  if(ct==="frequency"){
    const map={};
    [...cl.sessions].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(s=>{const key=new Date(s.date+"T00:00:00").toLocaleDateString("en-GB",{month:"short",year:"2-digit"});map[key]=(map[key]||0)+1;});
    const labels=Object.keys(map),data=Object.values(map);
    if(!labels.length){canvas.style.display="none";noData.style.display="flex";return;}
    canvas.style.display="block";noData.style.display="none";
    CI=new Chart(canvas,{type:"bar",data:{labels,datasets:[{data,backgroundColor:"rgba(192,57,43,0.85)",borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} sessions`}}},scales:{x:{ticks:{color:"#ffffff",font:{size:10}},grid:{display:false}},y:{ticks:{color:"#ffffff",font:{size:10},stepSize:1},grid:{color:"rgba(255,255,255,0.05)"}}}}});
    return;
  }
  const cols={squat:"#e05555",bench:"#4a9eff",deadlift:"#b06aff"},color=cols[ct];
  const pts=[...cl.sessions].filter(s=>s[ct]!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!pts.length){canvas.style.display="none";noData.style.display="flex";return;}
  canvas.style.display="block";noData.style.display="none";
  CI=new Chart(canvas,{
    type:"line",
    data:{labels:pts.map(s=>fmtS(s.date)),datasets:[{data:pts.map(s=>s[ct]),borderColor:color,backgroundColor:color+"28",borderWidth:2.5,pointBackgroundColor:pts.map(s=>s.notes&&(s.notes.includes("1RM")||s.notes.includes("great")||s.notes.includes("peak"))?"#ffd700":color),pointRadius:4,pointHoverRadius:7,fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}kg`,afterLabel:ctx=>pts[ctx.dataIndex].notes||""}}},scales:{x:{ticks:{color:"#ffffff",font:{size:10},maxTicksLimit:8},grid:{display:false}},y:{ticks:{color:"#ffffff",font:{size:10},callback:v=>`${v}kg`},grid:{color:"rgba(255,255,255,0.05)"}}}}
  });
}

function renderLog(cl){
  document.getElementById("ll").textContent=`Session Log (${cl.sessions.length})`;
  document.getElementById("log").innerHTML=[...cl.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>{
    const lifts=[s.squat!=null?`<span style="color:#e05555;font-weight:700">Squat ${s.squat}kg</span>`:"",s.bench!=null?`<span style="color:#4a9eff;font-weight:700">Bench ${s.bench}kg</span>`:"",s.deadlift!=null?`<span style="color:#b06aff;font-weight:700">Deadlift ${s.deadlift}kg</span>`:""].filter(Boolean).join("");
    return `<div class="si"><div class="sb"></div><div style="flex:1"><div style="font-size:12px;font-weight:900;color:#fff;margin-bottom:6px">${fmt(s.date)}</div><div style="display:flex;gap:16px;flex-wrap:wrap">${lifts}</div>${s.notes?`<div style="font-size:11px;color:#fff;margin-top:4px;opacity:0.7">${s.notes}</div>`:""}</div></div>`;
  }).join("");
}

function toggleLog(){lo=!lo;document.getElementById("log").style.display=lo?"block":"none";document.getElementById("la").textContent=lo?"▾":"▸";}
function startRename(){const cl=C.find(x=>x.id===cid);document.getElementById("ri").value=cl?cl.name:"";document.getElementById("rr").style.display="flex";document.getElementById("ri").focus();}
function saveRename(){const v=document.getElementById("ri").value.trim();if(v){const cl=C.find(x=>x.id===cid);if(cl){cl.name=v;sv();}}document.getElementById("rr").style.display="none";renderDetail();}
function cancelRename(){document.getElementById("rr").style.display="none";}

goList();
</script>
</body>
</html>
