<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Move Like A Human — Client Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --red:#c0392b;
    --red-light:#e05555;
    --bg:#0f1018;
    --card:rgba(255,255,255,0.03);
    --border:#1e2030;
    --dark:#232635;
  }
  body{background:var(--bg);color:#fff;font-family:'Courier New',monospace;min-height:100vh;}
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px;}
  .logo span.move{color:var(--red);font-size:18px;font-weight:900;letter-spacing:4px;}
  .logo span.rest{color:#fff;font-size:18px;font-weight:900;letter-spacing:4px;}
  button{cursor:pointer;font-family:'Courier New',monospace;}
  .btn-primary{background:var(--red);border:none;color:#fff;padding:11px 22px;border-radius:8px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
  .btn-back{background:transparent;border:none;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:0;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:#fff;padding:7px 14px;border-radius:6px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
  input,textarea,select{background:rgba(255,255,255,0.05);border:1px solid #2a2a3a;border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;font-family:'Courier New',monospace;outline:none;width:100%;}
  input[type=date]{color:#fff;}
  input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3);}
  label{font-size:10px;color:#fff;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:8px;}
  .screen{display:none;}
  .screen.active{display:block;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;}
  .stat-card.active{background:var(--dark);}
  .stat-card .lift-label{font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
  .stat-card .big-num{font-size:30px;font-weight:900;color:#fff;line-height:1;}
  .stat-card .sub{font-size:12px;color:#fff;margin-top:6px;}
  .stat-card .gain{font-size:12px;color:var(--red-light);margin-top:4px;font-weight:700;}
  .progress-bar{margin-top:10px;height:3px;background:#1a1a2a;border-radius:3px;}
  .progress-fill{height:100%;border-radius:3px;transition:width 0.5s;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:12px;}
  .tab{background:transparent;border:1px solid var(--border);color:#fff;border-radius:6px;padding:7px 16px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;}
  .tab.active{border:none;}
  .chart-wrap{height:260px;margin-bottom:20px;position:relative;}
  .session-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;gap:12px;margin-bottom:6px;}
  .session-bar{width:3px;min-height:36px;background:var(--red);border-radius:2px;flex-shrink:0;margin-top:2px;}
  .session-date{font-size:12px;font-weight:900;color:#fff;margin-bottom:6px;}
  .session-lifts{display:flex;gap:16px;flex-wrap:wrap;}
  .session-notes{font-size:11px;color:#fff;margin-top:4px;opacity:0.7;}
  .client-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .client-row:hover{border-color:var(--red);background:rgba(192,57,43,0.06);}
  .client-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;}
  .client-meta{font-size:11px;color:#fff;opacity:0.7;}
  .client-lifts{display:flex;gap:16px;margin-top:10px;}
  .arrow{color:var(--red);font-size:20px;font-weight:900;}
  .footer{margin-top:36px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .footer-sessions{font-size:9px;color:#fff;opacity:0.4;letter-spacing:2px;}
  h1{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px;}
  .subtitle{font-size:11px;color:#fff;opacity:0.7;margin-bottom:24px;}
  .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
  .name-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .rename-btn{background:transparent;border:none;color:#fff;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:0.5;cursor:pointer;font-family:'Courier New',monospace;}
  .rename-btn:hover{opacity:1;}
  .no-data{height:200px;display:flex;align-items:center;justify-content:center;color:#fff;opacity:0.3;font-size:13px;}
  .form-row{margin-bottom:18px;}
  .form-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;}
  .lift-input-label{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .lift-input{text-align:center;padding:14px 6px !important;font-size:18px !important;font-weight:900 !important;}
  .log-toggle{background:transparent;border:none;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Courier New',monospace;display:flex;align-items:center;gap:6px;margin-bottom:12px;}
  @media(max-width:600px){.grid3{grid-template-columns:1fr;}.form-grid3{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- LIST SCREEN -->
<div id="screen-list" class="screen active">
  <div class="wrap">
    <div class="header-row">
      <div class="logo"><span class="move">MOVE </span><span class="rest">LIKE A HUMAN</span></div>
      <button class="btn-primary" onclick="showAddClient()">+ Add Client</button>
    </div>
    <h1>Client Dashboard</h1>
    <div class="subtitle" id="client-count">0 clients · data saved automatically</div>
    <div id="client-list"></div>
  </div>
</div>

<!-- ADD CLIENT SCREEN -->
<div id="screen-add-client" class="screen">
  <div class="wrap" style="max-width:420px">
    <div class="logo" style="margin-bottom:32px"><span class="move">MOVE </span><span class="rest">LIKE A HUMAN</span></div>
    <button class="btn-back" onclick="showList()">← Back</button>
    <h1 style="margin-top:20px">New Client</h1>
    <p style="color:#fff;opacity:0.7;font-size:12px;margin:6px 0 24px">Enter their name to get started.</p>
    <div class="form-row">
      <label>Client Name</label>
      <input id="new-client-name" placeholder="e.g. Matt.A" onkeydown="if(event.key==='Enter')saveNewClient()"/>
    </div>
    <button class="btn-primary" onclick="saveNewClient()">Add Client</button>
  </div>
</div>

<!-- ADD SESSION SCREEN -->
<div id="screen-add-session" class="screen">
  <div class="wrap" style="max-width:440px">
    <div class="logo" style="margin-bottom:32px"><span class="move">MOVE </span><span class="rest">LIKE A HUMAN</span></div>
    <button class="btn-back" onclick="showDetail()">← Back</button>
    <h1 style="margin-top:20px">Log Session</h1>
    <p style="color:#fff;opacity:0.7;font-size:12px;margin:6px 0 24px" id="log-client-name"></p>
    <div class="form-row">
      <label>Date</label>
      <input type="date" id="session-date"/>
    </div>
    <div class="form-row">
      <label>Top Weight Per Lift (kg) — leave blank if not done</label>
      <div class="form-grid3">
        <div>
          <div class="lift-input-label" style="color:#e05555">Squat</div>
          <input type="number" id="session-squat" placeholder="—" class="lift-input"/>
        </div>
        <div>
          <div class="lift-input-label" style="color:#4a9eff">Bench</div>
          <input type="number" id="session-bench" placeholder="—" class="lift-input"/>
        </div>
        <div>
          <div class="lift-input-label" style="color:#b06aff">Deadlift</div>
          <input type="number" id="session-deadlift" placeholder="—" class="lift-input"/>
        </div>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:28px">
      <label>Notes (optional)</label>
      <textarea id="session-notes" placeholder="e.g. Holiday, sick, PB, missed reps..." rows="3" style="resize:vertical;min-height:80px"></textarea>
    </div>
    <button class="btn-primary" onclick="saveSession()">Save Session</button>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div id="screen-detail" class="screen">
  <div class="wrap">
    <div class="header-row">
      <div class="logo"><span class="move">MOVE </span><span class="rest">LIKE A HUMAN</span></div>
      <button class="btn-back" onclick="showList()">← All Clients</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div class="name-row">
          <h1 id="detail-name"></h1>
          <button class="rename-btn" onclick="startRename()">rename</button>
        </div>
        <div class="subtitle" id="detail-meta"></div>
      </div>
      <button class="btn-primary" onclick="showAddSession()">+ Log Session</button>
    </div>

    <!-- Rename input (hidden by default) -->
    <div id="rename-row" style="display:none;margin-bottom:20px;display:none">
      <input id="rename-input" style="max-width:300px;display:inline-block;margin-right:10px"/>
      <button class="btn-primary" style="padding:8px 14px;font-size:10px" onclick="saveRename()">Save</button>
      <button class="btn-ghost" style="margin-left:8px" onclick="cancelRename()">Cancel</button>
    </div>

    <!-- Stat cards -->
    <div class="grid3" style="margin-bottom:28px" id="stat-cards"></div>

    <!-- Chart tabs -->
    <div class="tabs" id="chart-tabs">
      <button class="tab active" id="tab-squat" style="background:#e05555" onclick="setChart('squat')">Squat</button>
      <button class="tab" onclick="setChart('bench')">Bench</button>
      <button class="tab" onclick="setChart('deadlift')">Deadlift</button>
      <button class="tab" onclick="setChart('frequency')">Frequency</button>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <canvas id="main-chart"></canvas>
      <div class="no-data" id="no-data-msg" style="display:none">No data recorded yet</div>
    </div>

    <!-- Session log -->
    <div style="margin-top:32px">
      <button class="log-toggle" onclick="toggleLog()">
        <span id="log-arrow">▸</span>
        <span id="log-label">Session Log</span>
      </button>
      <div id="session-log" style="display:none"></div>
    </div>

    <div class="footer">
      <div class="logo"><span class="move">MOVE </span><span class="rest">LIKE A HUMAN</span></div>
      <div class="footer-sessions" id="footer-sessions"></div>
    </div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

const PRE_SESSIONS = [
  {id:"p1",  date:"2024-12-27", squat:30,  bench:40,  deadlift:25,   notes:"First session"},
  {id:"p2",  date:"2024-12-30", squat:65,  bench:60,  deadlift:40,   notes:""},
  {id:"p3",  date:"2025-01-06", squat:75,  bench:75,  deadlift:50,   notes:""},
  {id:"p4",  date:"2025-01-13", squat:75,  bench:75,  deadlift:50,   notes:""},
  {id:"p5",  date:"2025-01-20", squat:75,  bench:80,  deadlift:60,   notes:"Rack pull Level 6 — 60kg"},
  {id:"p6",  date:"2025-08-04", squat:95,  bench:100, deadlift:60,   notes:"Back to training — band sessions"},
  {id:"p7",  date:"2025-08-11", squat:90,  bench:90,  deadlift:65,   notes:"Left side issue at 90kg squat"},
  {id:"p8",  date:"2025-08-18", squat:100, bench:95,  deadlift:null, notes:"1RM Test — Squat 100kg, Bench 95kg"},
  {id:"p9",  date:"2025-08-25", squat:95,  bench:90,  deadlift:70,   notes:""},
  {id:"p10", date:"2025-09-17", squat:85,  bench:90,  deadlift:70,   notes:"95kg squat failed"},
  {id:"p11", date:"2025-09-22", squat:85,  bench:85,  deadlift:75,   notes:"Deadlift peak — 75kg"},
  {id:"p12", date:"2025-09-29", squat:85,  bench:90,  deadlift:60,   notes:"Deadlift struggled"},
  {id:"p13", date:"2025-10-06", squat:90,  bench:90,  deadlift:75,   notes:""},
  {id:"p14", date:"2025-10-20", squat:75,  bench:90,  deadlift:70,   notes:"Tough session"},
  {id:"p15", date:"2025-10-27", squat:75,  bench:90,  deadlift:70,   notes:""},
  {id:"p16", date:"2025-11-03", squat:80,  bench:90,  deadlift:70,   notes:""},
  {id:"p17", date:"2025-12-01", squat:70,  bench:80,  deadlift:40,   notes:"Possible deload"},
  {id:"p18", date:"2025-12-08", squat:75,  bench:80,  deadlift:40,   notes:""},
  {id:"p19", date:"2025-12-15", squat:75,  bench:80,  deadlift:40,   notes:""},
  {id:"p20", date:"2026-01-14", squat:75,  bench:80,  deadlift:40,   notes:"Back from break"},
  {id:"p21", date:"2026-01-21", squat:80,  bench:90,  deadlift:45,   notes:"80kg squat x3 — good progress"},
  {id:"p22", date:"2026-01-28", squat:80,  bench:90,  deadlift:45,   notes:""},
  {id:"p23", date:"2026-02-09", squat:85,  bench:90,  deadlift:50,   notes:"85kg squat x3"},
  {id:"p24", date:"2026-03-16", squat:85,  bench:80,  deadlift:60,   notes:"Back from time off"},
  {id:"p25", date:"2026-03-23", squat:90,  bench:80,  deadlift:60,   notes:"90kg squat x3"},
  {id:"p26", date:"2026-03-30", squat:90,  bench:90,  deadlift:60,   notes:""},
  {id:"p27", date:"2026-04-06", squat:95,  bench:90,  deadlift:60,   notes:"95kg squat x2 — great session!"},
  {id:"p28", date:"2026-04-13", squat:95,  bench:90,  deadlift:60,   notes:"95kg squat x4, bench 90kg x3"},
  {id:"p29", date:"2026-04-20", squat:95,  bench:90,  deadlift:60,   notes:"Bench 90kg x3"},
];

function defaultClients() {
  return [{id:"c1", name:"Matt.A", sessions:[...PRE_SESSIONS]}];
}

function loadClients() {
  try {
    const s = localStorage.getItem("mlah_clients_v2");
    return s ? JSON.parse(s) : defaultClients();
  } catch { return defaultClients(); }
}

function saveClients() {
  localStorage.setItem("mlah_clients_v2", JSON.stringify(clients));
}

let clients = loadClients();
let currentClientId = null;
let currentChart = "squat";
let chartInstance = null;
let logOpen = false;

// ── Utilities ─────────────────────────────────────────────────────────────────

function fmtDate(d) {
  return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function fmtShort(d) {
  return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"});
}
function genId() { return Math.random().toString(36).substr(2,9); }

function getLatest(sessions, lift) {
  const s = [...sessions].filter(x=>x[lift]!=null).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return s.length ? s[0][lift] : null;
}
function getBest(sessions, lift) {
  const v = sessions.filter(x=>x[lift]!=null).map(x=>x[lift]);
  return v.length ? Math.max(...v) : null;
}
function getFirst(sessions, lift) {
  const s = [...sessions].filter(x=>x[lift]!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  return s.length ? s[0][lift] : null;
}
function getLastDate(sessions) {
  if (!sessions.length) return null;
  return [...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date;
}

// ── Navigation ────────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
}

function showList() {
  renderList();
  showScreen("list");
}

function showAddClient() {
  document.getElementById("new-client-name").value = "";
  showScreen("add-client");
}

function showDetail() {
  renderDetail();
  showScreen("detail");
}

function showAddSession() {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("session-date").value = today;
  document.getElementById("session-squat").value = "";
  document.getElementById("session-bench").value = "";
  document.getElementById("session-deadlift").value = "";
  document.getElementById("session-notes").value = "";
  const c = clients.find(x=>x.id===currentClientId);
  document.getElementById("log-client-name").textContent = c ? c.name : "";
  showScreen("add-session");
}

// ── List ──────────────────────────────────────────────────────────────────────

function renderList() {
  const list = document.getElementById("client-list");
  const count = document.getElementById("client-count");
  count.textContent = `${clients.length} client${clients.length!==1?"s":""} · data saved automatically`;

  list.innerHTML = clients.map(c => {
    const sq = getLatest(c.sessions,"squat");
    const bn = getLatest(c.sessions,"bench");
    const dl = getLatest(c.sessions,"deadlift");
    const last = getLastDate(c.sessions);
    const lifts = [
      sq!=null ? `<span style="color:#e05555;font-weight:700;font-size:12px">Squat ${sq}kg</span>` : "",
      bn!=null ? `<span style="color:#4a9eff;font-weight:700;font-size:12px">Bench ${bn}kg</span>` : "",
      dl!=null ? `<span style="color:#b06aff;font-weight:700;font-size:12px">Deadlift ${dl}kg</span>` : "",
    ].filter(Boolean).join("");

    return `
      <div class="client-row" onclick="openClient('${c.id}')">
        <div>
          <div class="client-name">${c.name}</div>
          <div class="client-meta">${c.sessions.length} sessions${last ? ` · Last ${fmtDate(last)}` : ""}</div>
          <div class="client-lifts">${lifts || '<span style="color:#fff;opacity:0.4;font-size:12px">No sessions yet</span>'}</div>
        </div>
        <div class="arrow">→</div>
      </div>
    `;
  }).join("");
}

function openClient(id) {
  currentClientId = id;
  currentChart = "squat";
  logOpen = false;
  renderDetail();
  showScreen("detail");
}

// ── Add Client ────────────────────────────────────────────────────────────────

function saveNewClient() {
  const name = document.getElementById("new-client-name").value.trim();
  if (!name) return;
  const c = {id:genId(), name, sessions:[]};
  clients.push(c);
  saveClients();
  currentClientId = c.id;
  renderDetail();
  showScreen("detail");
}

// ── Detail ────────────────────────────────────────────────────────────────────

function renderDetail() {
  const c = clients.find(x=>x.id===currentClientId);
  if (!c) return;

  document.getElementById("detail-name").textContent = c.name;
  const last = getLastDate(c.sessions);
  document.getElementById("detail-meta").textContent =
    `${c.sessions.length} sessions recorded${last ? " · Last session " + fmtDate(last) : ""}`;
  document.getElementById("footer-sessions").textContent = `${c.sessions.length} SESSIONS TRACKED`;

  renderStatCards(c);
  renderChart(c);
  renderSessionLog(c);
  updateTabs();
}

function renderStatCards(c) {
  const lifts = [
    {key:"squat",    label:"Squat",    color:"#e05555"},
    {key:"bench",    label:"Bench",    color:"#4a9eff"},
    {key:"deadlift", label:"Deadlift", color:"#b06aff"},
  ];
  document.getElementById("stat-cards").innerHTML = lifts.map(l => {
    const cur   = getLatest(c.sessions, l.key);
    const best  = getBest(c.sessions, l.key);
    const start = getFirst(c.sessions, l.key);
    const gain  = cur!=null && start!=null ? cur - start : null;
    const isActive = currentChart === l.key;
    const pct = cur && best ? (cur/best*100).toFixed(0) : 0;

    return `
      <div class="stat-card ${isActive?"active":""}" 
           style="border-color:${isActive?l.color:"var(--border)"}"
           onclick="setChart('${l.key}')">
        <div class="lift-label" style="color:${l.color}">${l.label}</div>
        ${cur != null ? `
          <div class="big-num">${cur}<span style="font-size:14px;font-weight:400;margin-left:4px">kg</span></div>
          <div class="sub">Best: <strong>${best}kg</strong></div>
          <div class="sub">Started: <strong>${start}kg</strong></div>
          ${gain!=null ? `<div class="gain">+${gain}kg gained</div>` : ""}
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${l.color}"></div></div>
        ` : `<div style="font-size:13px;color:#fff;opacity:0.4;margin-top:8px">No data yet</div>`}
      </div>
    `;
  }).join("");
}

function setChart(type) {
  currentChart = type;
  const c = clients.find(x=>x.id===currentClientId);
  renderStatCards(c);
  renderChart(c);
  updateTabs();
}

function updateTabs() {
  const tabs = document.querySelectorAll(".tab");
  const colors = {squat:"#e05555", bench:"#4a9eff", deadlift:"#b06aff", frequency:"#c0392b"};
  const labels = ["squat","bench","deadlift","frequency"];
  tabs.forEach((t,i) => {
    const k = labels[i];
    if (k === currentChart) {
      t.classList.add("active");
      t.style.background = colors[k];
      t.style.color = "#fff";
      t.style.borderColor = "transparent";
    } else {
      t.classList.remove("active");
      t.style.background = "transparent";
      t.style.color = "#fff";
      t.style.borderColor = "var(--border)";
    }
  });
}

function renderChart(c) {
  const canvas = document.getElementById("main-chart");
  const noData = document.getElementById("no-data-msg");

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  if (currentChart === "frequency") {
    const map = {};
    [...c.sessions].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(s => {
      const d = new Date(s.date+"T00:00:00");
      const key = d.toLocaleDateString("en-GB",{month:"short",year:"2-digit"});
      map[key] = (map[key]||0) + 1;
    });
    const labels = Object.keys(map);
    const data   = Object.values(map);

    if (!labels.length) { canvas.style.display="none"; noData.style.display="flex"; return; }
    canvas.style.display="block"; noData.style.display="none";

    chartInstance = new Chart(canvas, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: "rgba(192,57,43,0.8)",
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.raw} sessions`}} },
        scales:{
          x:{ ticks:{color:"#fff",font:{size:10}}, grid:{display:false} },
          y:{ ticks:{color:"#fff",font:{size:10},stepSize:1}, grid:{color:"rgba(255,255,255,0.05)"} }
        }
      }
    });
    return;
  }

  const liftColors = {squat:"#e05555", bench:"#4a9eff", deadlift:"#b06aff"};
  const color = liftColors[currentChart];

  const points = [...c.sessions]
    .filter(s=>s[currentChart]!=null)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  if (!points.length) { canvas.style.display="none"; noData.style.display="flex"; return; }
  canvas.style.display="block"; noData.style.display="none";

  const labels = points.map(s=>fmtShort(s.date));
  const data   = points.map(s=>s[currentChart]);
  const notes  = points.map(s=>s.notes||"");

  chartInstance = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: color.replace(")", ",0.15)").replace("rgb","rgba"),
        borderWidth: 2.5,
        pointBackgroundColor: points.map(s=>s.notes&&(s.notes.includes("1RM")||s.notes.includes("great")||s.notes.includes("peak"))?"#ffd700":color),
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label: ctx => `${ctx.raw}kg`,
            afterLabel: ctx => notes[ctx.dataIndex] ? notes[ctx.dataIndex] : "",
          }
        }
      },
      scales:{
        x:{ ticks:{color:"#fff",font:{size:10},maxTicksLimit:8}, grid:{display:false} },
        y:{ ticks:{color:"#fff",font:{size:10},callback:v=>`${v}kg`}, grid:{color:"rgba(255,255,255,0.05)"} }
      }
    }
  });
}

function renderSessionLog(c) {
  const log = document.getElementById("session-log");
  const label = document.getElementById("log-label");
  label.textContent = `Session Log (${c.sessions.length})`;

  const sorted = [...c.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  log.innerHTML = sorted.map(s => {
    const lifts = [
      s.squat    != null ? `<span style="color:#e05555;font-weight:700">Squat ${s.squat}kg</span>` : "",
      s.bench    != null ? `<span style="color:#4a9eff;font-weight:700">Bench ${s.bench}kg</span>` : "",
      s.deadlift != null ? `<span style="color:#b06aff;font-weight:700">Deadlift ${s.deadlift}kg</span>` : "",
    ].filter(Boolean).join("");
    return `
      <div class="session-item">
        <div class="session-bar"></div>
        <div style="flex:1">
          <div class="session-date">${fmtDate(s.date)}</div>
          <div class="session-lifts">${lifts}</div>
          ${s.notes ? `<div class="session-notes">${s.notes}</div>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById("session-log").style.display = logOpen ? "block" : "none";
  document.getElementById("log-arrow").textContent = logOpen ? "▾" : "▸";
}

// ── Save Session ──────────────────────────────────────────────────────────────

function saveSession() {
  const date     = document.getElementById("session-date").value;
  const squat    = document.getElementById("session-squat").value;
  const bench    = document.getElementById("session-bench").value;
  const deadlift = document.getElementById("session-deadlift").value;
  const notes    = document.getElementById("session-notes").value.trim();

  if (!date) return;

  const s = {
    id: genId(), date,
    squat:    squat    ? parseFloat(squat)    : null,
    bench:    bench    ? parseFloat(bench)    : null,
    deadlift: deadlift ? parseFloat(deadlift) : null,
    notes,
  };

  const c = clients.find(x=>x.id===currentClientId);
  if (c) { c.sessions.push(s); saveClients(); }
  showDetail();
}

// ── Rename ────────────────────────────────────────────────────────────────────

function startRename() {
  const c = clients.find(x=>x.id===currentClientId);
  document.getElementById("rename-input").value = c ? c.name : "";
  document.getElementById("rename-row").style.display = "block";
  document.getElementById("rename-input").focus();
}

function saveRename() {
  const val = document.getElementById("rename-input").value.trim();
  if (val) {
    const c = clients.find(x=>x.id===currentClientId);
    if (c) { c.name = val; saveClients(); }
  }
  document.getElementById("rename-row").style.display = "none";
  renderDetail();
}

function cancelRename() {
  document.getElementById("rename-row").style.display = "none";
}

// ── Init ──────────────────────────────────────────────────────────────────────

showList();
</script>
</body>
</html>
